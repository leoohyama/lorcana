name: eBay Daily Market Float (Cloud Edition)

on:
  schedule:
    # 04:30 UTC perfectly aligns with 12:30 AM Eastern Time (EDT)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI for testing

jobs:
  run-ebay-scraper:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # CRITICAL: Forces the Ubuntu runner and R's Sys.Date() to Eastern Time
      TZ: 'America/New_York' 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          # Uses pre-compiled binaries to install the tidyverse in seconds rather than minutes
          use-public-rspm: true 

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::tidyverse
            any::httr
            any::jsonlite
            any::base64enc
            any::DBI
            any::RPostgres

      - name: Run eBay API & Push to Neon
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript ebay_api_download.R