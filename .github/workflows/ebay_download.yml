name: eBay Daily Market Float

# Controls when the workflow will run
on:
  schedule:
    # Runs at 00:30 UTC every day 
    - cron: '30 0 * * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write # Required to push the new CSVs back to your repo

jobs:
  run-ebay-scraper:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures the bot downloads the full git history for a clean rebase

      # 2. Set up R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # 3. Install required R packages 
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::httr
            any::jsonlite
            any::base64enc

      # 4. Run the Scraper Script
      - name: Run eBay API Script
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: Rscript ebay_api_download.R 

      # 5. Commit and Push the new CSV
      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          
          # NEW: Pull any changes you made to the repo locally to avoid git collisions!
          git pull --rebase origin main
          
          # Only add files in the granular_listings folder to avoid accidental commits
          git add data/granular_listings/*
          
          # Commit and Push
          git diff-index --quiet HEAD || git commit -m "Automated dual-route eBay inventory pull"
          git push origin main