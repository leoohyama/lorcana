name: eBay Daily Market Float (Cloud + Local AI)

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch: 

jobs:
  # ==========================================
  # JOB 1: THE SCRAPER (Runs in the Cloud)
  # ==========================================
  run-ebay-scraper:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TZ: 'America/New_York' 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true 

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::tidyverse
            any::httr
            any::jsonlite
            any::base64enc
            any::DBI
            any::RPostgres

      - name: Run eBay API & Push to Neon
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript ebay_api_download.R

  # ==========================================
  # JOB 2: THE AI CLEANER (Runs on your Mac)
  # ==========================================
  run-gemma-cleaner:
    needs: run-ebay-scraper # Crucial: This tells GitHub to wait until Job 1 finishes!
    runs-on: self-hosted    # Routes the job to your MacBook Air runner

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Wake up Ollama
        run: |
          nohup /usr/local/bin/ollama serve > ollama.log 2>&1 &
          sleep 5 
          curl -I http://localhost:11434/ || echo "Ollama failed to start"

      - name: Run Gemma Cleaner
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        # Update this path if your script is saved in a specific folder!
        run: Rscript run_gemma_cleaner.R