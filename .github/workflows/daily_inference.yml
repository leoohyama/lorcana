name: Daily Lorcana Market Inference

on:
  workflow_run:
    workflows: ["JustTCG Daily Price Pull (Cloud Edition)"]
    types:
      - completed
  workflow_dispatch: 

jobs:
  run-inference-pipeline:
    runs-on: self-hosted
    timeout-minutes: 30 
    # CRITICAL: Only run if the price pull succeeded, or if you clicked the manual button
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 1. Run PyTorch Preprocessing
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript preprocessing.R

      - name: ⏱️ 2. Run Chronos Preprocessing
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript chronos_data_processing.R

      - name: 🔮 3. Run GRU Future Inference
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python daily_inference_gru.py

      - name: 🚀 4. Run Chronos Future Inference
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python chronos_transfer_learning.py

      - name: 🧮 5. Calculate Live Residuals (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript update_residuals.R

      - name: 📦 6. Sync Daily Data to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 Auto-infer: Daily forecasts & residuals uploaded to Neon"
          file_pattern: 'data/*.csv'
          push_options: '--force'