name: JustTCG Daily Price Pull (Cloud Edition)

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  pull-prices:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TZ: 'America/New_York'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true 

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::tidyverse
            any::jsonlite
            any::httr
            any::DBI
            any::RPostgres

      - name: Run Daily Price Scraper & Push to Neon
        env:
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript pull_daily_prices.R