name: Scrape Lorcana Prices

on:
  schedule:
    # Runs at 00:00 UTC on every 2nd day of the month
    - cron: '0 0 */2 * *'
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  pull-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the bot can commit the new CSV to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # jsonlite/httr/tidyverse often need curl under the hood on Linux
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install R Packages
        run: |
          install.packages(c("tidyverse", "jsonlite"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run Price Scraper
        # Update this path if you saved the R script in a specific folder!
        run: Rscript pull_prices.R 

      - name: Commit and Push Data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/running_data/*
          git commit -m "Automated price pull: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push