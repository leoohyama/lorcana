name: Scrape Daily Prices

on:
  schedule:
    # Runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  pull-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the new CSV to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install R Packages
        # Dropping the 'repos' argument forces GitHub to use the fast binaries
        run: |
          install.packages(c("tidyverse", "jsonlite", "httr"))
        shell: Rscript {0}

      - name: Run Daily Price Scraper
        env:
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
        run: Rscript pull_daily_prices.R 

      - name: Commit and Push Data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/running_data/*
          git commit -m "Automated daily price pull: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push