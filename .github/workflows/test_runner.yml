name: MacBook Air Environment Test

on:
  push:
    paths:
      - 'test_env.R'
      - '.github/workflows/test.yaml'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub UI

jobs:
  smoke-test:
    # This specifically targets your local MacBook Air runner
    runs-on: self-hosted 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Package Smoke Test
        run: Rscript test_env.R