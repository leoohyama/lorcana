name: Full Lorcana ML Production Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: self-hosted
    timeout-minutes: 120 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Fix Git Buffer (Prevents 400 Error)
        run: |
          git config --local http.postBuffer 524288000
          git config --local core.compression 0

      # ==========================================
      # PHASE 0: DATA PREPARATION
      # ==========================================
      - name: 📊 1. Run PyTorch Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript preprocessing.R

      - name: ⏱️ 2. Run Chronos Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript chronos_data_processing.R

      # ==========================================
      # PHASE 1: BACKTESTING (Looking Backward)
      # ==========================================
      - name: 🧠 3. Train GRU & Generate Backtest CSVs
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python train_lorcana_model.py

      - name: ⏱️ 4. Run Chronos Backtest CSVs
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python chronos_backtest.py

      - name: 📈 5. Calculate & Push Diagnostics to Neon
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript model_diagnostics.R

      # ==========================================
      # PHASE 2: INFERENCE (Looking Forward)
      # ==========================================
      - name: 🔮 6. Run GRU Future Inference & Push to Neon
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python daily_inference_gru.py

      - name: 🚀 7. Run Chronos Future Inference & Push to Neon
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python chronos_transfer_learning.py

      # ==========================================
      # PHASE 3: BACKUP & COMMIT
      # ==========================================
      - name: 💾 Save Model Weights Locally (Backup)
        run: |
          BACKUP_DIR="$HOME/Documents/lorcana_model_backups/$(date +'%Y-%m-%d_%H-%M')"
          mkdir -p "$BACKUP_DIR"
          cp data/pytorch/*.pth "$BACKUP_DIR/"
          echo "✨ Models successfully backed up to: $BACKUP_DIR"

      - name: 📦 8. Sync and Push Results to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Latest Lorcana forecasts, backtests, and Neon sync"
          file_pattern: 'data/pytorch/*.pth data/pytorch/*.csv data/*.csv'
          push_options: '--force'