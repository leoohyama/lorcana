name: Full Lorcana ML Production Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: self-hosted
    timeout-minutes: 120 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          # This ensures we have the full history, which helps with larger pushes
          fetch-depth: 0

      - name: 🔧 Fix Git Buffer (Prevents 400 Error)
        run: |
          git config --local http.postBuffer 524288000
          git config --local core.compression 0

      - name: 📊 1. Run PyTorch Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript preprocessing.R

      - name: ⏱️ 2. Run Chronos Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript chronos_data_processing.R

      - name: 🤖 3. Run Chronos Inference
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python chronos_transfer_learning.py

      - name: 🧠 4. Run GRU Training
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python train_lorcana_model.py

      - name: 💾 Save Model Weights Locally (Backup)
        run: |
          BACKUP_DIR="$HOME/Documents/lorcana_model_backups/$(date +'%Y-%m-%d_%H-%M')"
          mkdir -p "$BACKUP_DIR"
          cp data/pytorch/*.pth "$BACKUP_DIR/"
          echo "✨ Models successfully backed up to: $BACKUP_DIR"

      - name: 🚀 5. Sync and Push Results to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Latest Lorcana forecasts and Neon data"
          # Explicitly listing the patterns ensures your .pth files are included
          file_pattern: 'data/pytorch/*.pth data/*.csv'
          # This helps if the runner is in a detached state
          push_options: '--force'