name: Full Lorcana ML Production Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering
  # schedule:
  #   - cron: '0 8 * * 0' # Optional: Run automatically every Sunday at 8 AM

jobs:
  run-pipeline:
    runs-on: self-hosted
    
    # Chronos is heavy; this gives your Mac plenty of time to finish the batches
    timeout-minutes: 120 

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📊 1. Run PyTorch Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript preprocessing.R

      - name: ⏱️ 2. Run Chronos Preprocessing (Neon DB)
        env:
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript chronos_data_processing.R

      - name: 🤖 3. Just run chronos
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python chronos_transfer_learning.py

      - name: 🧠 4. Run GRU
        run: /Users/leoohyama/opt/miniconda3/envs/lorcana-ml/bin/python train_lorcana_model.py

      - name: 💾 Save Model Weights Locally
        run: |
          # Create a backup folder in your Documents with today's date
          BACKUP_DIR="$HOME/Documents/lorcana_model_backups/$(date +'%Y-%m-%d_%H-%M')"
          mkdir -p "$BACKUP_DIR"
          
          # Copy all .pth files to the local backup folder
          cp data/pytorch/*.pth "$BACKUP_DIR/"
          
          echo "✨ Models successfully backed up to: $BACKUP_DIR"

      - name: 🚀 5. Sync and Push Results to GitHub
        # Automatically grabs the newly generated CSVs and pushes them to your repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Latest Lorcana forecasts and Neon data"